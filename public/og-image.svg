    <pattern id="stars" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
      <!-- Stars at hex centers -->
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(0,0)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(60,0)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(120,0)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(30,52)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(90,52)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(0,104)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(60,104)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
      <polygon points="35.00,0.00 13.53,5.88 29.44,23.72 8.75,13.78 13.53,5.88 0.00,0.00 -13.53,5.88 -8.75,13.78 -29.44,23.72 -13.53,5.88 -35.00,0.00 -13.53,-5.88 -29.44,-23.72 -8.75,-13.78 -13.53,-5.88 0.00,0.00 13.53,-5.88 8.75,-13.78 29.44,-23.72 13.53,-5.88" transform="translate(120,104)" fill="none" stroke="#3a5c3e" stroke-width="0.7" stroke-linejoin="round"/>
