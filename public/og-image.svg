<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1f1a"/>
      <stop offset="100%" stop-color="#111411"/>
    </linearGradient>

    <!-- Accent glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="42%" r="28%">
      <stop offset="0%" stop-color="#6aab74" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6aab74" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle corner vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0a0d0a" stop-opacity="0.6"/>
    </radialGradient>

